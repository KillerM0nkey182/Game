<!DOCTYPE html>
<html lang="en">
<head>

<title>Industry Idle: Expanded</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#050a10;color:#a0b8cc;font-family:'Inter',system-ui,sans-serif;font-size:12px;overflow:hidden;user-select:none;-webkit-user-select:none}
#game{display:flex;flex-direction:column;height:100vh}

/* ── TOP BAR ── */
#topbar{height:40px;background:rgba(10,20,35,0.85);backdrop-filter:blur(8px);border-bottom:1px solid #1a304d;display:flex;align-items:center;flex-shrink:0;overflow:hidden;gap:0;padding:0 12px;box-shadow:0 4px 20px rgba(0,0,0,0.5);z-index:10}
.cash-blk{display:flex;align-items:center;gap:6px;padding-right:15px;border-right:1px solid #1c3555;flex-shrink:0}
.c-ico{font-size:15px;filter:drop-shadow(0 0 5px rgba(240,200,64,0.6))}
.c-val{color:#f5d04c;font-size:14px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:0.5px}
.pw-blk{display:flex;align-items:center;gap:6px;padding:0 15px;border-right:1px solid #1c3555;flex-shrink:0}
#hdr-pw{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;text-shadow:0 0 8px rgba(56,216,80,0.4)}
#rbar{display:flex;overflow:hidden;flex:1;align-items:center;height:100%}
.ri{display:flex;align-items:center;gap:5px;padding:0 12px;border-right:1px solid #152840;flex-shrink:0;height:100%}
.ra{font-size:11px;font-weight:800;letter-spacing:0.5px;text-shadow:0 0 4px currentColor}
.rv{font-size:11px;color:#cbdcf0;font-family:'JetBrains Mono',monospace}
.rr{font-size:10px;font-family:'JetBrains Mono',monospace;color:#38d850;background:rgba(56,216,80,0.1);padding:2px 4px;border-radius:3px}
.rr.neg{color:#f04c4c;background:rgba(240,76,76,0.1)}

/* ── MAIN ── */
#main{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── CANVAS ── */
#cw{flex:1;overflow:hidden;cursor:grab;position:relative;background:radial-gradient(circle at center, #0a1524 0%, #03060a 100%)}
#cw.dragging{cursor:grabbing}
#map{display:block}

/* ── SIDEBAR ── */
#sb{width:280px;background:rgba(12,24,40,0.9);backdrop-filter:blur(15px);border-left:1px solid #1a304d;display:flex;flex-direction:column;flex-shrink:0;box-shadow:-5px 0 25px rgba(0,0,0,0.5);z-index:10}

.tab{flex:1;padding:12px 2px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:#4c6a8a;border-bottom:2px solid transparent;letter-spacing:1px;text-transform:uppercase;transition:all .2s}

.tab:not(.on):hover{color:#7ca0c4;background:rgba(255,255,255,0.02)}
#sb-body{flex:1;overflow-y:auto;padding:8px}
.sechdr{font-size:10px;letter-spacing:2px;font-weight:800;color:#3a5a7a;padding:12px 4px 6px;text-transform:uppercase}
.bcard{background:linear-gradient(145deg, #0f1f33, #0a1524);border:1px solid #1c3555;border-radius:6px;padding:10px;margin-bottom:6px;cursor:pointer;transition:all .15s ease}

.btop{display:flex;align-items:center;gap:8px}
.bic{font-size:18px;line-height:1}
.bn{flex:1;font-size:12px;font-weight:700;color:#c0d6eb}
.bcs{font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:700}
.bsub{font-size:10px;color:#5c7c9c;margin-top:4px;display:flex;gap:6px;align-items:center}
.bsub-tag{background:rgba(0,0,0,0.3);padding:2px 5px;border-radius:4px;border:1px solid rgba(255,255,255,0.05)}

/* selected building */
.selhdr{display:flex;align-items:center;gap:12px;padding:10px 8px 12px;border-bottom:1px solid #1a304d;background:rgba(0,0,0,0.2);border-radius:6px;margin-bottom:10px}

<script>
'use strict';
// ═══════════════════════════════════════════════════════ HEX CONSTANTS
const HR = 32;                           
const HW = Math.sqrt(3) * HR;           
const HHS = HR * 1.5;                   
const GCOLS = 64, GROWS = 50;           

function hcen(col, row) {
  return {
    x: HW * col + (row & 1 ? HW / 2 : 0) + HW,
    y: HHS * row + HR + HHS * 0.5
  };
}

function hexPath(ctx, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 3 * i - Math.PI / 2;
    i ? ctx.lineTo(r * Math.cos(a), r * Math.sin(a))
      : ctx.moveTo(r * Math.cos(a), r * Math.sin(a));
  }
  ctx.closePath();
}

const HC = Object.create(null);
for (let row = 0; row < GROWS; row++)
  for (let col = 0; col < GCOLS; col++)
    HC[`${col},${row}`] = hcen(col, row);

function s2h(sx, sy) {
  // Convert screen coordinates to world coordinates based on zoom
  const wx = (sx / cam.z) + cam.x;
  const wy = (sy / cam.z) + cam.y;
  let best = null, bst = (HR * 1.4) * (HR * 1.4);
  for (const key in HC) {
    const { x, y } = HC[key];
    const d = (wx - x) * (wx - x) + (wy - y) * (wy - y);
    if (d < bst) { bst = d; best = key; }
  }
  if (!best) return null;
  const [col, row] = best.split(',').map(Number);
  return { col, row, key: best };
}

// ═══════════════════════════════════════════════════════ GAME DATA
const RES = {
  fe:   { name:'Iron Ore',     abbr:'Fe',   col:'#d16c47', cat:0, sell:3  },
  si:   { name:'Silicon',      abbr:'Si',   col:'#8bbdf0', cat:0, sell:4  },

};

const DEP = Object.create(null);
const depTypes = ['fe','fe','si','cu','cu','coal','coal','al','ti','oil','oil','au','u'];
function hash(x, y) { return Math.abs(Math.sin(x * 12.9898 + y * 78.233) * 43758.5453); }

for (let r = 0; r < GROWS; r++) {
  for (let c = 0; c < GCOLS; c++) {
    let h1 = hash(c, r);
    let h2 = hash(Math.floor(c/5), Math.floor(r/5)); 
    if (h2 - Math.floor(h2) > 0.65) {
      if (h1 - Math.floor(h1) > 0.45) {
        let distanceFactor = (c + r) / (GCOLS + GROWS); 
        let availableTypes = Math.floor(5 + distanceFactor * (depTypes.length - 5)); 
        availableTypes = Math.min(availableTypes, depTypes.length);
        let typeIdx = Math.floor((h2 * 100) % availableTypes);
        DEP[`${c},${r}`] = depTypes[typeIdx];
      }
    }
  }
}
const startClusters = { "2,2":"fe","3,2":"coal","2,3":"cu","4,3":"si","3,4":"fe","2,4":"coal" };
Object.assign(DEP, startClusters);

const BCOL = {

  al_mine:'#505898', ti_mine:'#2c5480', oil_pump:'#283858', au_mine:'#8a711c', u_mine:'#1e5c14',
  power_plant:'#1c3a80', nuc_plant:'#0f3d13',
  iron_smelt:'#883020', copper_smelt:'#984018', steel_mill:'#1c4888', gold_smelt:'#8a631c',

  { id:'petro',   n:'Petrochemicals', cost:2000, desc:'Unlocks Oil Refinery (Crude Oil → Plastic)' },

// ═══════════════════════════════════════════════════════ STATE
const fmt = n => n >= 1e9 ? (n/1e9).toFixed(2)+'B' : n >= 1e6 ? (n/1e6).toFixed(2)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : Math.floor(n)+'';
const fmtR = n => Math.abs(n) < 0.05 ? '' : (n > 0 ? '+' : '') + n.toFixed(1) + '/s';

let G = {
  money: 1500,
  res: Object.fromEntries(Object.keys(RES).map(r => [r, 0])),
  grid: Object.create(null),
  power: { gen: 0, con: 0 },
  research: [],
  tick: 0,
  totalEarned: 0,
};

let cam     = { x: 0, y: 0, z: 1.0 }; // Added zoom level
let placing = null;
let selKey  = null;
let activeTab = 'build';
let glog    = [];
let parts   = [];
let fx      = []; // New effects array for placement shockwaves
let dragSt  = null;
let animT   = 0;

// ═══════════════════════════════════════════════════════ HELPERS
function bldCost(id) {
  const n = Object.values(G.grid).filter(c => c.id === id).length;
  return Math.floor(BLDGS[id].cost * Math.pow(1.15, n));
}
function calcPower() {
  let gen = 0, con = 0;
  for (const c of Object.values(G.grid)) {
    const b = BLDGS[c.id]; if (!b) continue;
    const lv = c.lv || 1;
    b.pw > 0 ? (gen += b.pw * lv) : (con += Math.abs(b.pw) * lv);
  }
  return { gen, con };
}
function calcRates() {
  const r = Object.fromEntries(Object.keys(RES).map(k => [k, 0]));
  const { gen, con } = calcPower();
  const powered = gen >= con;
  for (const c of Object.values(G.grid)) {
    const b = BLDGS[c.id]; if (!b) continue;
    const lv = c.lv || 1;
    if (b.pw <= 0 && !powered) continue;
    b.pro.forEach(p => r[p.r] += p.a * lv);
    b.con.forEach(p => r[p.r] -= p.a * lv);
  }
  return r;
}
function addLog(msg) {
  glog.unshift({ msg, id: Date.now() + Math.random() });
  if (glog.length > 80) glog.length = 80;
  if (activeTab === 'log') renderContent();
}

// ═══════════════════════════════════════════════════════ GAME TICK
function gameTick() {
  const pw = calcPower();
  G.power = pw;
  const powered = pw.gen >= pw.con;

  for (const [key, c] of Object.entries(G.grid)) {
    const b = BLDGS[c.id]; if (!b) continue;
    const lv = c.lv || 1;
    if (b.pw <= 0 && !powered) continue;
    if (b.con.every(x => (G.res[x.r] || 0) >= x.a * lv)) {
      b.con.forEach(x => G.res[x.r] -= x.a * lv);
      b.pro.forEach(x => {
        G.res[x.r] = (G.res[x.r] || 0) + x.a * lv;
        const { x: wx, y: wy } = HC[key];
        for (let i = 0; i < Math.min(x.a * lv, 5); i++) {
          parts.push({
            wx: wx + (Math.random() - .5) * 16,
            wy: wy + (Math.random() - .5) * 16,
            vx: (Math.random() - .5) * 1.6,
            vy: -(0.8 + Math.random() * 2),
            col: RES[x.r].col,
            life: 60 + Math.random() * 40,
            max: 100,
          });
        }
      });
    }
  }
  G.tick++;
  updateUI();
}

// ═══════════════════════════════════════════════════════ CANVAS
const canvas = document.getElementById('map');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const w = document.getElementById('cw');
  canvas.width  = w.clientWidth;
  canvas.height = w.clientHeight;
}

function drawFrame(t) {
  animT = t;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Apply Camera Transform (Zoom and Pan)
  ctx.save();
  ctx.scale(cam.z, cam.z);
  ctx.translate(-cam.x, -cam.y);

  // Background grid dots
  ctx.fillStyle = 'rgba(100, 150, 255, 0.05)';
  const viewW = canvas.width / cam.z;
  const viewH = canvas.height / cam.z;
  let bgX = cam.x - (cam.x % 40);
  let bgY = cam.y - (cam.y % 40);
  
  for(let x = bgX; x < cam.x + viewW; x += 40) {
      for(let y = bgY; y < cam.y + viewH; y += 40) {
          ctx.fillRect(x, y, 2, 2);
      }
  }

  const pbData = placing ? BLDGS[placing] : null;
  
  // Render Hexes (with Zoom culling)
  for (const [key, { x: wx, y: wy }] of Object.entries(HC)) {
    if (wx < cam.x - HR * 2 || wx > cam.x + viewW + HR * 2 || 
        wy < cam.y - HR * 2 || wy > cam.y + viewH + HR * 2) continue;
    drawHex(key, wx, wy, pbData, t);
  }

  // Render Visual Effects (Shockwaves)
  for (let i = fx.length - 1; i >= 0; i--) {
    const e = fx[i];
    const prog = e.life / e.max;
    
    ctx.beginPath();
    ctx.arc(e.wx, e.wy, HR * (prog * 1.5 + 0.5), 0, 6.28);
    ctx.strokeStyle = `rgba(100, 255, 100, ${1 - prog})`;
    ctx.lineWidth = 6 * (1 - prog);
    ctx.stroke();

    e.life++;
    if (e.life > e.max) fx.splice(i, 1);
  }

  // Render Particles
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    const alpha = (p.life / p.max);
    
    ctx.globalAlpha = alpha * 0.5;
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.wx, p.wy, 4, 0, 6.28); ctx.fill();

    ctx.globalAlpha = alpha;
    ctx.beginPath(); ctx.arc(p.wx, p.wy, 1.5, 0, 6.28); ctx.fill();
    
    p.wx += p.vx; p.wy += p.vy; p.vy *= 0.95; p.vx *= 0.95; p.life--;
    if (p.life <= 0) parts.splice(i, 1);
  }
  
  ctx.restore(); // Restore context to screen coordinates
  requestAnimationFrame(drawFrame);
}

function drawHex(key, wx, wy, pbData, t) {
  const dep  = DEP[key];
  const cell = G.grid[key];
  const isSel = selKey === key;
  const canPlace = pbData && !cell && (pbData.dep ? dep === pbData.dep : !dep);

  ctx.save();
  ctx.translate(wx, wy);

  // Hex fill
  hexPath(ctx, HR - 2);
  ctx.fillStyle = dep ? 'rgba(20,45,75,0.7)' : 'rgba(10,25,45,0.4)';
  ctx.fill();

  // Glowing borders
  hexPath(ctx, HR - 2);
  ctx.strokeStyle = isSel ? '#f0d050' : canPlace ? '#38e050' : dep ? 'rgba(60,110,160,0.6)' : 'rgba(30,60,95,0.3)';
  ctx.lineWidth   = isSel ? 3 : canPlace ? 2 : 1;
  if(isSel || canPlace) {
      ctx.shadowColor = ctx.strokeStyle;
      ctx.shadowBlur = 10;
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Valid placement highlight pulse
  if (canPlace) {
    const pulse = (Math.sin(t * 0.005) + 1) * 0.5;
    hexPath(ctx, HR - 3);
    ctx.fillStyle = `rgba(56,208,80,${0.1 + pulse * 0.15})`;
    ctx.fill();
  }

  // Deposit label
  if (dep && !cell) {
    const rv = RES[dep];
    ctx.shadowColor = rv.col;
    ctx.shadowBlur = 8;
    ctx.fillStyle = rv.col;
    ctx.font = 'bold 12px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(rv.abbr, 0, 0);
    ctx.shadowBlur = 0;
  }

  // Building
  if (cell) {
    const bd = BLDGS[cell.id];
    const lv = cell.lv || 1;
    const { gen, con } = G.power;
    const active = bd.pw > 0 || gen >= con;
    const bcol   = BCOL[cell.id] || '#283848';
    const cr     = Math.round(HR * 0.65);

    // PLACEMENT ANIMATION (Bounce effect)
    let bScale = 1;
    if (cell.placedAt) {
        const age = Date.now() - cell.placedAt;
        if (age < 400) {
            const p = age / 400;
            // Elastic ease out
            bScale = 1 + Math.sin(p * Math.PI * 3) * Math.exp(-p * 6) * 0.5;
        } else {
            delete cell.placedAt;
        }
    }
    
    ctx.scale(bScale, bScale);

    if (isSel) {
      const gv = (Math.sin(t * 0.004) + 1) * 0.5;
      ctx.shadowColor = '#f0d050';
      ctx.shadowBlur  = 15 + gv * 10;
    }

    // Building Base
    ctx.beginPath(); ctx.arc(0, 0, cr, 0, 6.28);
    const bg = ctx.createLinearGradient(0, -cr, 0, cr);
    bg.addColorStop(0, bcol);
    bg.addColorStop(1, '#050a10');
    ctx.fillStyle = bg; ctx.fill();

    // Inner Glow
    const g = ctx.createRadialGradient(-cr*0.3, -cr*0.3, 0, 0, 0, cr);
    g.addColorStop(0, 'rgba(255,255,255,0.25)');
    g.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = g; ctx.fill();

    if (isSel) ctx.shadowBlur = 0;

    // Circle border
    ctx.beginPath(); ctx.arc(0, 0, cr, 0, 6.28);
    ctx.strokeStyle = active ? 'rgba(150,220,255,0.4)' : 'rgba(250,80,80,0.6)';
    ctx.lineWidth = 2; ctx.stroke();

    // Icon
    ctx.font = `${Math.round(cr * 1.1)}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(bd.ic, 0, 1);

    // Level indicator
    if (lv > 1) {
      const bx = cr * 0.7, by = -cr * 0.7;
      ctx.fillStyle = '#0a1524';
      ctx.beginPath(); ctx.arc(bx, by, 8, 0, 6.28); ctx.fill();
      ctx.strokeStyle = '#f0c840'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = '#f0c840'; ctx.font = 'bold 8px "JetBrains Mono", monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(lv, bx, by+1);
    }

    // Status dot
    ctx.shadowColor = active ? '#38f060' : '#f03838';
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(cr - 4, -cr + 4, 3.5, 0, 6.28);
    ctx.fillStyle = active ? '#38f060' : '#f03838'; ctx.fill();
    ctx.shadowBlur = 0;

    // Rate label
    if (bd.pro.length > 0) {
      const rate = bd.pro[0].a * lv;
      const rr = RES[bd.pro[0].r];
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      const str = rate + '/s';
      ctx.font = 'bold 9px "JetBrains Mono", monospace';
      const lw = ctx.measureText(str).width + 8;
      ctx.beginPath(); ctx.roundRect(-lw/2, cr + 3, lw, 14, 4); ctx.fill();
      ctx.fillStyle = rr.col;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(str, 0, cr + 6);
    }
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════ INPUT
const cw = document.getElementById('cw');

cw.addEventListener('mousedown', e => {
  dragSt = { ox: e.clientX, oy: e.clientY, cx: cam.x, cy: cam.y, moved: false };
  cw.classList.add('dragging');
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!dragSt) return;
  // Account for zoom level when panning!
  const dx = (e.clientX - dragSt.ox) / cam.z; 
  const dy = (e.clientY - dragSt.oy) / cam.z;
  if (Math.abs(dx) + Math.abs(dy) > 4) dragSt.moved = true;
  if (dragSt.moved) { cam.x = dragSt.cx - dx; cam.y = dragSt.cy - dy; clampCam(); }
});
window.addEventListener('mouseup', e => {
  if (!dragSt) return;
  if (!dragSt.moved) {
    const r = canvas.getBoundingClientRect();
    const h = s2h(e.clientX - r.left, e.clientY - r.top);
    if (h) onHexClick(h.col, h.row, h.key);
  }
  dragSt = null;
  cw.classList.remove('dragging');
});

// SCROLL TO ZOOM
cw.addEventListener('wheel', e => {
  e.preventDefault();
  
  const zoomSpeed = 0.0015;
  const prevZ = cam.z;
  
  cam.z -= e.deltaY * zoomSpeed;
  cam.z = Math.max(0.4, Math.min(2.5, cam.z)); // Zoom bounds

  // Math to ensure we zoom IN on the exact spot the mouse is hovering over
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left;
  const my = e.clientY - r.top;

  cam.x += (mx / prevZ) - (mx / cam.z);
  cam.y += (my / prevZ) - (my / cam.z);

  clampCam();
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { stopPlace(); selKey = null; renderContent(); }
  const sp = 40 / cam.z;
  if (e.key === 'ArrowLeft')  { cam.x -= sp; clampCam(); }
  if (e.key === 'ArrowRight') { cam.x += sp; clampCam(); }
  if (e.key === 'ArrowUp')    { cam.y -= sp; clampCam(); }
  if (e.key === 'ArrowDown')  { cam.y += sp; clampCam(); }
});

function clampCam() {
  const worldW = GCOLS * HW + HW * 1.5;
  const worldH = GROWS * HHS + HR * 2.5;
  const viewW = canvas.width / cam.z;
  const viewH = canvas.height / cam.z;
  
  cam.x = Math.max(-viewW/2, Math.min(cam.x, worldW - viewW/2));
  cam.y = Math.max(-viewH/2, Math.min(cam.y, worldH - viewH/2));
}

function onHexClick(col, row, key) {
  const dep = DEP[key];
  if (placing) {
    const pb = BLDGS[placing];
    if (G.grid[key])              { addLog('⚠️ Hex already occupied'); return; }
    if (pb.dep && dep !== pb.dep) { addLog(`⚠️ Must place on ${(RES[pb.dep]||{}).abbr||pb.dep} deposit`); return; }
    if (!pb.dep && dep)           { addLog('⚠️ Processing buildings go on empty hexes'); return; }
    const cost = bldCost(placing);
    if (G.money < cost)           { addLog(`⚠️ Need $${fmt(cost)}`); return; }
    
    // Build it and mark creation time for animation
    G.grid[key] = { id: placing, lv: 1, placedAt: Date.now() };
    G.money -= cost;
    addLog(`✅ Built ${pb.name}`);

    // PLACEMENT FX: Shockwave + Particle Burst
    const wx = HC[key].x;
    const wy = HC[key].y;
    fx.push({ wx, wy, life: 0, max: 25 }); // Add shockwave
    
    // Add sparks
    for(let i=0; i<15; i++) {
        parts.push({
            wx, wy,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            col: '#ffffff',
            life: 20 + Math.random() * 20,
            max: 40
        });
    }

    updateUI();
  } else {
    selKey = selKey === key ? null : key;
    updateUI();
  }
}

// ═══════════════════════════════════════════════════════ UI
function startPlace(id) {
  placing = placing === id ? null : id;
  selKey = null;
  const badge = document.getElementById('pbadge');
  badge.style.display = placing ? 'block' : 'none';
  if (placing) document.getElementById('pname').textContent = BLDGS[placing].name;
  renderContent();
}
function stopPlace() {
  placing = null;
  document.getElementById('pbadge').style.display = 'none';
  renderContent();
}
function setTab(t) {
  activeTab = t;
  ['build','market','research','log'].forEach(id =>
    document.getElementById('tab-'+id).classList.toggle('on', id === t));
  if (t !== 'build') selKey = null;
  renderContent();
}

function updateUI() {
  document.getElementById('hdr-cash').textContent = '$' + fmt(G.money);
  const pw = G.power;
  const pe = document.getElementById('hdr-pw');
  pe.textContent = `${pw.gen}/${pw.con} MW`;
  pe.style.color = pw.gen >= pw.con ? '#38d850' : '#f04c4c';
  pe.style.textShadow = pw.gen >= pw.con ? '0 0 8px rgba(56,216,80,0.4)' : '0 0 8px rgba(240,76,76,0.4)';

  const rates = calcRates();
  let rhtml = '';
  for (const [r, rv] of Object.entries(RES)) {
    const a = G.res[r] || 0, rt = rates[r] || 0;
    if (a === 0 && rt === 0) continue;
    const rs = fmtR(rt);
    rhtml += `<div class="ri"><span class="ra" style="color:${rv.col}">${rv.abbr}</span><span class="rv">${fmt(a)}</span>${rs ? `<span class="rr ${rt < 0 ? 'neg' : ''}">${rs}</span>` : ''}</div>`;
  }
  document.getElementById('rbar').innerHTML = rhtml ||
    '<span style="color:#4a6a8a;font-size:11px;padding:0 12px;font-weight:600">Build Extractors on glowing deposits to begin</span>';

  renderContent();
}

function renderContent() {
  const el = document.getElementById('sb-body');
  const selCell = selKey ? G.grid[selKey] : null;
  const selBD   = selCell ? BLDGS[selCell.id] : null;

  if (activeTab === 'build') {
    if (selCell && selBD && !placing) renderSelPanel(el, selKey, selCell, selBD);
    else renderPalette(el);
  } else if (activeTab === 'market')   renderMarketPanel(el);
  else if (activeTab === 'research')   renderResearchPanel(el);
  else                                  renderLogPanel(el);
}

function renderPalette(el) {
  let h = '';
  for (let t = 0; t <= 3; t++) {
    const items = Object.entries(BLDGS).filter(([,b]) => b.t === t);
    h += `<div class="sechdr">${TIER_NAMES[t]}</div>`;
    items.forEach(([id, b]) => {
      const locked = b.req && !G.research.includes(b.req);
      const cost   = bldCost(id);
      const canA   = G.money >= cost;
      const active = placing === id;
      
      let tags = '';
      b.pro.forEach(p => tags += `<span class="bsub-tag">out: ${RES[p.r].abbr}</span>`);
      if(b.pw) tags += `<span class="bsub-tag" style="color:${b.pw>0?'#38d850':'#f04c4c'}">${b.pw>0?'+':''}${b.pw}MW</span>`;

      h += `<div class="bcard ${active ? 'act' : ''} ${locked ? 'blk' : ''}" onclick="${locked ? '' : `startPlace('${id}')`}">
        <div class="btop">
          <span class="bic">${b.ic}</span>
          <span class="bn">${b.name}${locked ? ' 🔒' : ''}</span>
          <span class="bcs" style="color:${locked ? '#4a6a8a' : canA ? '#f5d04c' : '#a04040'}">${locked ? 'Locked' : '$' + fmt(cost)}</span>
        </div>
        <div class="bsub">${tags}</div>
      </div>`;
    });
  }
  el.innerHTML = h;
}

function renderSelPanel(el, key, cell, bd) {
  const lv = cell.lv || 1;
  const { gen, con } = G.power;
  const active = bd.pw > 0 || gen >= con;
  const uc     = Math.floor(bd.cost * lv * 2.5);
  el.innerHTML = `
    <div class="selhdr">
      <span style="font-size:28px;filter:drop-shadow(0 0 10px rgba(255,255,255,0.2))">${bd.ic}</span>
      <div>
        <div style="font-size:15px;font-weight:800;color:#e0eefc;letter-spacing:0.5px">${bd.name}</div>
        <div style="font-size:11px;color:#7ca0c4;margin-top:4px;font-weight:600">Level ${lv} &nbsp;·&nbsp; <span style="color:${active ? '#38d850' : '#f04c4c'};text-shadow:0 0 5px currentColor">${active ? 'Working' : 'Idle — No Power'}</span></div>
      </div>
    </div>
    <div class="sr"><span class="sl">Power</span><span style="color:${bd.pw < 0 ? '#f04c4c' : '#38d850'};font-family:'JetBrains Mono',monospace">${bd.pw > 0 ? '+' : ''}${bd.pw * lv} MW</span></div>
    ${bd.pro.map(p => `<div class="sr"><span class="sl" style="color:#50a050">Produces</span><span style="color:${RES[p.r].col};font-family:'JetBrains Mono',monospace">+${p.a * lv}/s ${RES[p.r].name}</span></div>`).join('')}
    ${bd.con.map(p => `<div class="sr"><span class="sl" style="color:#a05050">Consumes</span><span style="color:#e06060;font-family:'JetBrains Mono',monospace">−${p.a * lv}/s ${RES[p.r].name}</span></div>`).join('')}
    
    <div style="margin-top:15px">
      <button class="abtn ubtn" onclick="upgBld('${key}')">⬆ Upgrade to Lvl ${lv + 1}<br><span style="font-size:10px;font-family:'JetBrains Mono';opacity:.8">$${fmt(uc)}</span></button>
      <button class="abtn dbtn" onclick="demBld('${key}')">↩ Demolish<br><span style="font-size:10px;opacity:.8">50% refund</span></button>
      <button class="abtn" style="background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);color:#8ca0b4;margin-top:15px" onclick="selKey=null;renderContent()">← Back</button>
    </div>`;
}

function renderMarketPanel(el) {
  let h = '';
  for (const [r, rv] of Object.entries(RES)) {
    const a = G.res[r] || 0;
    h += `<div class="mrow">
      <div class="mdot" style="background:${rv.col};box-shadow:0 0 6px ${rv.col}"></div>
      <span class="mn">${rv.name}</span>
      <span class="ma">${fmt(a)}</span>
      <span class="mp">$${rv.sell}/ea</span>
      <button class="mbtn" ${a < 1 ? 'disabled' : ''} onclick="doSell('${r}')">Sell</button>
    </div>`;
  }
  h += `<button class="sabtn" onclick="sellAll()">💰 SELL ALL RESOURCES</button>`;
  el.innerHTML = h;
}

function renderResearchPanel(el) {
  let h = '';
  RESEARCH.forEach(rt => {
    const done   = G.research.includes(rt.id);
    const locked = rt.req && rt.req.some(r => !G.research.includes(r));
    const canA   = G.money >= rt.cost;
    h += `<div class="rcard ${done ? 'rdone' : ''} ${locked ? 'rlk' : ''}">
      <div class="rn">${rt.n}</div>
      <div class="rd">${rt.desc}</div>
      ${done ? '<div style="color:#38d850;font-size:11px;font-weight:700">✓ Completed</div>'
             : `<button class="rbtn" ${locked || !canA ? 'disabled' : ''} onclick="doResearch('${rt.id}')">Research - $${fmt(rt.cost)}</button>`}
    </div>`;
  });
  el.innerHTML = h;
}

function renderLogPanel(el) {
  el.innerHTML = glog.length
    ? glog.map(l => `<div class="le">${l.msg}</div>`).join('')
    : '<div class="le" style="color:#4a6a8a;border-left-color:transparent">No events yet. Start building!</div>';
}

// ═══════════════════════════════════════════════════════ ACTIONS
function upgBld(key) {
  const c = G.grid[key]; if (!c) return;
  const lv = c.lv || 1, cost = Math.floor(BLDGS[c.id].cost * lv * 2.5);
  if (G.money < cost) { addLog(`⚠️ Need $${fmt(cost)} to upgrade`); return; }
  G.grid[key] = { ...c, lv: lv + 1 };
  G.money -= cost;
  addLog(`⬆️ ${BLDGS[c.id].name} upgraded to Level ${lv + 1}`);
  updateUI();
}
function demBld(key) {
  const c = G.grid[key]; if (!c) return;
  const cnt  = Object.values(G.grid).filter(x => x.id === c.id).length;
  const paid = Math.floor(BLDGS[c.id].cost * Math.pow(1.15, cnt - 1));
  const ref  = Math.floor(paid * 0.5);
  delete G.grid[key]; G.money += ref; selKey = null;
  addLog(`↩️ Demolished ${BLDGS[c.id].name} — refunded $${fmt(ref)}`);
  updateUI();
}
function doSell(r) {
  const a = Math.floor(G.res[r] || 0); if (a < 1) return;
  const inc = a * RES[r].sell;
  G.res[r] = 0; G.money += inc; G.totalEarned += inc;
  addLog(`💰 Sold ${fmt(a)} ${RES[r].name} → $${fmt(inc)}`);
  updateUI();
}
function sellAll() {
  let tot = 0;
  for (const r of Object.keys(RES)) { tot += Math.floor((G.res[r] || 0) * RES[r].sell); G.res[r] = 0; }
  G.money += tot; G.totalEarned += tot;
  addLog(`💰 Sold all resources → $${fmt(tot)}`);
  updateUI();
}
function doResearch(id) {
  const rt = RESEARCH.find(r => r.id === id); if (!rt) return;
  if (G.money < rt.cost) { addLog(`⚠️ Need $${fmt(rt.cost)}`); return; }
  if (rt.req && rt.req.some(r => !G.research.includes(r))) { addLog('⚠️ Prerequisites missing'); return; }
  G.money -= rt.cost; G.research.push(id);
  addLog(`🔬 Researched: ${rt.n}`);
  updateUI();
}

// ═══════════════════════════════════════════════════════ INIT
window.addEventListener('resize', () => { resizeCanvas(); clampCam(); });
resizeCanvas();
cam.x = Math.max(0, (2 * HW + HW) / 2 - canvas.width  / 2);
cam.y = Math.max(0, (2 * HHS + HR) / 2 - canvas.height / 2);

requestAnimationFrame(drawFrame);
setInterval(gameTick, 1000);
updateUI();
addLog('System initialized. Scroll wheel zoom enabled.');
</script>
